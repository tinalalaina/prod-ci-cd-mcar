version: "3.9"

services:
  db:
    image: postgres:15
    container_name: postgres_db
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    ports:
      - "5432:5432"
    networks:
      - app_net

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    env_file:
      - .env
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "5050:80"
    restart: always
    depends_on:
      - db
    networks:
      - app_net

  backend:
    image: ${DOCKERHUB_USERNAME}/gasy-car-backend:latest
    container_name: django_backend
    env_file:
      - .env
    command: >
      sh -c "
        python manage.py collectstatic --noinput &&
        python manage.py migrate --noinput &&
        python manage.py create_default_admin &&
        python manage.py create_default_client &&
        python manage.py create_default_prestataire &&
        python manage.py create_default_support &&
        python manage.py seed_vehicule_data &&
        python manage.py add_vehicule_equipments &&
        python manage.py create_default_blog &&
        python manage.py create_blog_roadtrip &&
        python manage.py create_blog_itineraires &&
        python manage.py runserver 0.0.0.0:8000
      "
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DEBUG: ${DEBUG}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DEFAULT_ADMIN_EMAIL: ${DEFAULT_ADMIN_EMAIL}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD}
      DEFAULT_ADMIN_FIRST_NAME: ${DEFAULT_ADMIN_FIRST_NAME}
      DEFAULT_ADMIN_LAST_NAME: ${DEFAULT_ADMIN_LAST_NAME}
      DEFAULT_CLIENT_EMAIL: ${DEFAULT_CLIENT_EMAIL}
      DEFAULT_CLIENT_PASSWORD: ${DEFAULT_CLIENT_PASSWORD}
      DEFAULT_CLIENT_FIRST_NAME: ${DEFAULT_CLIENT_FIRST_NAME}
      DEFAULT_CLIENT_LAST_NAME: ${DEFAULT_CLIENT_LAST_NAME}
      DEFAULT_PRESTATAIRE_EMAIL: ${DEFAULT_PRESTATAIRE_EMAIL}
      DEFAULT_PRESTATAIRE_PASSWORD: ${DEFAULT_PRESTATAIRE_PASSWORD}
      DEFAULT_PRESTATAIRE_FIRST_NAME: ${DEFAULT_PRESTATAIRE_FIRST_NAME}
      DEFAULT_PRESTATAIRE_LAST_NAME: ${DEFAULT_PRESTATAIRE_LAST_NAME}
      DEFAULT_SUPPORT_EMAIL: ${DEFAULT_SUPPORT_EMAIL}
      DEFAULT_SUPPORT_PASSWORD: ${DEFAULT_SUPPORT_PASSWORD}
      DEFAULT_SUPPORT_FIRST_NAME: ${DEFAULT_SUPPORT_FIRST_NAME}
      DEFAULT_SUPPORT_LAST_NAME: ${DEFAULT_SUPPORT_LAST_NAME}
    volumes:
      - media_volume:/app/media
      - static_volume:/app/static
    depends_on:
      - db
    networks:
      - app_net
    ports:
      - "8000:8000"
    restart: always

  frontend:
    image: ${DOCKERHUB_USERNAME}/gasy-car-frontend:latest
    container_name: react_frontend
    environment:
      VITE_API_BASE_URL: https://mcar.tina-lalaina.site/api
    networks:
      - app_net
    ports:
      - "3000:80"
    restart: always

  nginx:
    image: nginx:1.25
    container_name: nginx_reverse_proxy
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
      - media_volume:/app/media
      - static_volume:/app/static
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - frontend
    restart: always
    networks:
      - app_net

  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do sleep 12h; certbot renew; done;'"
    networks:
      - app_net

volumes:
  postgres_data:
  media_volume:
  static_volume:

networks:
  app_net:
    driver: bridge
