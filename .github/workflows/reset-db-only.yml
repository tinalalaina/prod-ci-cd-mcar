name: Reset Database & Media Only

on:
  push:
    branches:
      - db
  workflow_dispatch:

jobs:
  reset-db:
    runs-on: ubuntu-latest

    steps:
      - name: Install sshpass
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Reset DB & Media on server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST || vars.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER || vars.SERVER_USER }}
          SERVER_IP: ${{ secrets.SERVER_IP || vars.SERVER_IP }}
          SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
        run: |
          set -euo pipefail

          HOST="${SERVER_HOST:-}"
          SERVER_USER="${SERVER_USER:-}"

          if [ -z "$HOST" ]; then
            if [ -z "${SERVER_IP:-}" ]; then
              echo "Missing SERVER_HOST or SERVER_IP GitHub secret"
              exit 1
            fi

            if [ -z "$SERVER_USER" ]; then
              SERVER_USER="root"
            fi

            HOST="$SERVER_USER@${SERVER_IP}"
          fi

          if [ -z "${SERVER_PASSWORD:-}" ]; then
            echo "Missing SERVER_PASSWORD GitHub secret"
            exit 1
          fi

          sshpass -p "$SERVER_PASSWORD" ssh -T -o StrictHostKeyChecking=no "$HOST" << 'EOF'
          set -e

          cd prod-ci-cd-gasycar-main

          docker compose stop backend frontend || true
          docker compose stop db || true

          docker volume rm prod-ci-cd-gasycar-main_media_volume prod-ci-cd-gasycar-main_postgres_data prod-ci-cd-gasycar-main_static_volume || true

          docker compose up -d db
          sleep 10
          docker compose up -d backend frontend nginx

          echo "Database & media reset completed"
          EOF
