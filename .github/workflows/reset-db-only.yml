name: Reset Database & Media Only

on:
  push:
    branches:
      - db
  workflow_dispatch:

jobs:
  reset-db:
    runs-on: ubuntu-latest

    steps:
      - name: Install sshpass
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Reset DB & Media on server
        run: |
          set -euo pipefail

          HOST="${{ secrets.SERVER_HOST }}"
          if [ -z "$HOST" ]; then
            if [ -z "${{ secrets.SERVER_USER }}" ] || [ -z "${{ secrets.SERVER_IP }}" ]; then
              echo "Missing SERVER_HOST or SERVER_USER/SERVER_IP GitHub secrets"
              exit 1
            fi
            HOST="${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}"
          fi

          if [ -z "${{ secrets.SERVER_PASSWORD }}" ]; then
            echo "Missing SERVER_PASSWORD GitHub secret"
            exit 1
          fi

          sshpass -p "${{ secrets.SERVER_PASSWORD }}" ssh -T -o StrictHostKeyChecking=no "$HOST" << 'EOF'
          set -e

          cd prod-ci-cd-gasycar-main

          docker compose stop backend frontend || true
          docker compose stop db || true

          docker volume rm prod-ci-cd-gasycar-main_media_volume prod-ci-cd-gasycar-main_postgres_data prod-ci-cd-gasycar-main_static_volume || true

          docker compose up -d db
          sleep 10
          docker compose up -d backend frontend nginx

          echo "Database & media reset completed"
          EOF
